<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Cozy Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: default;
      display: flex;
    }

    /* ── Chat Panel ─────────────────────────────── */
    #chat-panel {
      width: 280px;
      min-width: 280px;
      height: 100vh;
      background: #16213e;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      z-index: 20;
    }
    #chat-header {
      padding: 14px 16px;
      background: #1a1a3e;
      border-bottom: 1px solid #2a2a4a;
    }
    #chat-header h3 {
      color: #e8d5b7;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: normal;
      letter-spacing: 1px;
    }
    #identity-label {
      color: #8a8aaa;
      font-size: 12px;
    }
    #workout-btn {
      width: 100%;
      margin-top: 4px;
      background: #1a2e3a;
      color: #a4c8f8;
      border: 1px solid #2a4a5a;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.2s;
    }
    #workout-btn:hover:not(:disabled) { background: #2a4a5a; }
    #workout-btn:disabled { opacity: 0.4; cursor: default; }

    #online-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 11px;
      color: #8a8aaa;
    }
    #online-dot {
      color: #4CAF50;
      font-size: 10px;
      line-height: 1;
    }

    #cuddle-btn {
      width: 100%;
      margin-top: 8px;
      background: #3a1a2e;
      color: #f8a4c8;
      border: 1px solid #5a2a4a;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.2s;
    }
    #cuddle-btn:hover:not(:disabled) { background: #5a2a4a; }
    #cuddle-btn:disabled { opacity: 0.4; cursor: default; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }

    .msg {
      max-width: 90%;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .msg .msg-name {
      font-size: 10px;
      opacity: 0.6;
      margin-bottom: 2px;
    }
    .msg-other {
      background: #2a2a4a;
      color: #c8c8e8;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .msg-self {
      background: #3a3a6a;
      color: #e8e8ff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .msg-system {
      color: #6a6a8a;
      font-size: 11px;
      text-align: center;
      align-self: center;
      padding: 4px;
    }

    #chat-input-row {
      padding: 10px 12px;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 6px;
    }
    #chat-input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      color: #e8d5b7;
      padding: 8px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    #chat-input:focus { border-color: #5a5a8a; }
    #chat-send {
      background: #3a3a6a;
      color: #e8d5b7;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    #chat-send:hover { background: #4a4a7a; }

    /* ── Canvas Area ────────────────────────────── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #e8d5b7;
      font-size: 14px;
      opacity: 0.6;
      text-align: center;
      pointer-events: none;
    }
    #time-display {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #e8d5b7;
      font-size: 16px;
      opacity: 0.7;
    }
    #weather-display {
      position: absolute;
      top: 44px;
      right: 20px;
      color: #e8d5b7;
      font-size: 12px;
      opacity: 0.6;
    }

    /* ── Mobile Chat Toggle ──────────────────── */
    #chat-toggle {
      display: none;
      text-align: center;
      padding: 10px;
      color: #8a8aaa;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      -webkit-user-select: none;
      user-select: none;
    }
    #chat-toggle::before {
      content: '';
      display: block;
      width: 36px;
      height: 4px;
      background: #4a4a6a;
      border-radius: 2px;
      margin: 0 auto 6px;
    }

    /* ── Mobile Layout (Galaxy S23/S24) ──────── */
    @media (max-width: 600px) {
      body { position: relative; }
      #chat-toggle { display: block; }
      #canvas-wrap {
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0; left: 0;
      }
      #chat-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%; min-width: 100%;
        height: auto; max-height: 60vh;
        border-right: none;
        border-top: 2px solid #3a3a5a;
        border-radius: 14px 14px 0 0;
        background: rgba(22, 33, 62, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      #chat-panel:not(.chat-open) #chat-messages,
      #chat-panel:not(.chat-open) #chat-input-row {
        display: none;
      }
      #chat-panel.chat-open #chat-messages {
        max-height: 25vh;
      }
      #chat-header { padding: 10px 16px; }
      #chat-header h3 { font-size: 12px; margin-bottom: 6px; }
      #chat-input { font-size: 16px; }
      #cuddle-btn, #workout-btn { padding: 10px; font-size: 13px; }
      #ui { display: none; }
      #time-display { font-size: 13px; top: 10px; right: 10px; }
    }
  </style>
</head>
<body>
  <div id="chat-panel">
    <div id="chat-toggle">Chat</div>
    <div id="chat-header">
      <h3>OUR COZY CHAT</h3>
      <div id="identity-label">Connecting...</div>
      <div id="online-status">
        <span id="online-dot">&#9679;</span>
        <span id="online-text">0 online</span>
      </div>
      <button id="cuddle-btn" disabled>&#128149; Cuddle Break</button>
      <button id="workout-btn" disabled style="display:none">&#128170; Workout</button>
    </div>
    <div id="chat-messages">
      <div class="msg msg-system">Welcome to our cozy office!</div>
    </div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Type a message..." maxlength="500" disabled>
      <button id="chat-send" disabled>Send</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="ui">our cozy little office</div>
    <div id="time-display"></div>
    <div id="weather-display"></div>
  </div>

  <script src="js/iso.js?v=4"></script>
  <script src="js/config.js?v=4"></script>
  <script src="js/state.js?v=4"></script>
  <script src="js/collision.js?v=5"></script>
  <script src="js/sprites/ui.js?v=4"></script>
  <script src="js/sprites/furniture.js?v=4"></script>
  <script src="js/sprites/characters.js?v=4"></script>
  <script src="js/sprites/pets.js?v=4"></script>
  <script src="js/sprites/environment.js?v=4"></script>
  <script src="js/sprites/misc.js?v=4"></script>
  <script src="js/weather.js?v=4"></script>
  <script src="js/humans.js?v=4"></script>
  <script src="js/pets.js?v=4"></script>
  <script src="js/events.js?v=4"></script>
  <script src="js/scene.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
  <script>
    // ── Chat Client (auto-identified by IP) ─────────
    (function() {
      // Mobile chat toggle
      document.getElementById('chat-toggle').addEventListener('click', function() {
        document.getElementById('chat-panel').classList.toggle('chat-open');
      });

      let myName = '';
      let myRole = '';
      let workoutActive = false;
      let ws = null;
      const messagesEl = document.getElementById('chat-messages');
      const inputEl = document.getElementById('chat-input');
      const sendBtn = document.getElementById('chat-send');
      const cuddleBtn = document.getElementById('cuddle-btn');
      const workoutBtn = document.getElementById('workout-btn');
      const onlineText = document.getElementById('online-text');
      const identityLabel = document.getElementById('identity-label');

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const role = new URLSearchParams(location.search).get('role') || 'girl';
        ws = new WebSocket(`${proto}//${location.host}?role=${role}`);
        ws.onopen = () => addSystemMsg('Connected!');
        ws.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'identity') {
              myName = msg.name;
              myRole = msg.role;
              identityLabel.textContent = 'Logged in as ' + myName;
              inputEl.disabled = false;
              sendBtn.disabled = false;
              cuddleBtn.disabled = false;
              if (myRole === 'boy') {
                workoutBtn.style.display = '';
                workoutBtn.disabled = false;
              }
              // Apply current workout state from server
              if (msg.workoutActive) {
                workoutActive = true;
                workoutBtn.textContent = '\u{1F6D1} Stop Workout';
                workoutBtn.style.background = '#3a1a1a';
                window.dispatchEvent(new CustomEvent('workout', { detail: { name: msg.name, active: true } }));
              }
              inputEl.focus();
            } else if (msg.type === 'join') {
              addSystemMsg(msg.name + ' joined the office');
            } else if (msg.type === 'leave') {
              addSystemMsg(msg.name + ' left the office');
            } else if (msg.type === 'users') {
              onlineText.textContent = msg.count + ' online' + (msg.names.length ? ': ' + msg.names.join(', ') : '');
            } else if (msg.type === 'cuddle') {
              addSystemMsg('\u{1F495} ' + msg.name + ' called for a cuddle break!');
              window.dispatchEvent(new CustomEvent('cuddle', { detail: { name: msg.name } }));
            } else if (msg.type === 'workout') {
              console.log('[WS] workout msg received:', msg);
              if (msg.active) {
                addSystemMsg('\u{1F4AA} ' + msg.name + ' started a workout!');
              } else {
                addSystemMsg(msg.name + ' finished working out');
              }
              workoutActive = msg.active;
              workoutBtn.textContent = workoutActive ? '\u{1F6D1} Stop Workout' : '\u{1F4AA} Workout';
              workoutBtn.style.background = workoutActive ? '#3a1a1a' : '';
              window.dispatchEvent(new CustomEvent('workout', { detail: { name: msg.name, active: msg.active } }));
            } else if (msg.type === 'chat') {
              addChatMsg(msg.name, msg.text, msg.name === myName);
            }
          } catch (err) { console.error('WS message error:', err); }
        };
        ws.onclose = () => {
          addSystemMsg('Disconnected. Reconnecting...');
          inputEl.disabled = true;
          sendBtn.disabled = true;
          cuddleBtn.disabled = true;
          workoutBtn.disabled = true;
          identityLabel.textContent = 'Reconnecting...';
          setTimeout(connect, 2000);
        };
      }

      function addSystemMsg(text) {
        const el = document.createElement('div');
        el.className = 'msg msg-system';
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addChatMsg(name, text, isSelf) {
        const el = document.createElement('div');
        el.className = isSelf ? 'msg msg-self' : 'msg msg-other';
        const nameEl = document.createElement('div');
        nameEl.className = 'msg-name';
        nameEl.textContent = name;
        el.appendChild(nameEl);
        const textEl = document.createElement('div');
        textEl.textContent = text;
        el.appendChild(textEl);
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ text: text }));
        inputEl.value = '';
      }

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      cuddleBtn.addEventListener('click', () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'cuddle' }));
      });

      workoutBtn.addEventListener('click', () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'workout', active: !workoutActive }));
      });

      connect();
    })();
  </script>
</body>
</html>
