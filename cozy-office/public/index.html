<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Cozy Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: default;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #e8d5b7;
      font-size: 14px;
      opacity: 0.6;
      text-align: center;
      pointer-events: none;
    }
    #time-display {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #e8d5b7;
      font-size: 16px;
      opacity: 0.7;
    }
    #weather-display {
      position: absolute;
      top: 44px;
      right: 20px;
      color: #e8d5b7;
      font-size: 12px;
      opacity: 0.6;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    #controls button {
      background: #3a1a2e;
      color: #f8a4c8;
      border: 1px solid #5a2a4a;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.2s;
    }
    #controls button:hover { background: #5a2a4a; }
    #controls .workout-btn {
      background: #1a2e3a;
      color: #a4c8f8;
      border-color: #2a4a5a;
    }
    #controls .workout-btn:hover { background: #2a4a5a; }
    #controls .workout-btn.active {
      background: #3a1a1a;
      color: #f8a4a4;
      border-color: #5a2a2a;
    }

    #back-link {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #6a6a8a;
      font-size: 12px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #back-link:hover { opacity: 1; }

    @media (max-width: 600px) {
      #ui { display: none; }
      #time-display { font-size: 13px; top: 10px; right: 10px; }
      #controls { top: 10px; left: 10px; }
      #controls button { padding: 10px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">our cozy little office</div>
  <div id="time-display"></div>
  <div id="weather-display"></div>

  <div id="controls">
    <button id="cuddle-btn">&#128149; Cuddle Break</button>
    <button id="workout-btn" class="workout-btn">&#128170; Workout</button>
  </div>

  <a id="back-link" href="/">&larr; back to apps</a>

  <script src="js/iso.js?v=5"></script>
  <script src="js/config.js?v=5"></script>
  <script src="js/state.js?v=5"></script>
  <script src="js/collision.js?v=5"></script>
  <script src="js/sprites/ui.js?v=5"></script>
  <script src="js/sprites/furniture.js?v=5"></script>
  <script src="js/sprites/characters.js?v=5"></script>
  <script src="js/sprites/pets.js?v=5"></script>
  <script src="js/sprites/environment.js?v=5"></script>
  <script src="js/sprites/misc.js?v=5"></script>
  <script src="js/weather.js?v=5"></script>
  <script src="js/humans.js?v=5"></script>
  <script src="js/pets.js?v=5"></script>
  <script src="js/events.js?v=5"></script>
  <script src="js/scene.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
  <script>
    (function() {
      let workoutActive = false;
      const cuddleBtn = document.getElementById('cuddle-btn');
      const workoutBtn = document.getElementById('workout-btn');

      cuddleBtn.addEventListener('click', () => {
        window.dispatchEvent(new CustomEvent('cuddle'));
      });

      workoutBtn.addEventListener('click', () => {
        workoutActive = !workoutActive;
        workoutBtn.textContent = workoutActive ? '\u{1F6D1} Stop Workout' : '\u{1F4AA} Workout';
        workoutBtn.classList.toggle('active', workoutActive);
        window.dispatchEvent(new CustomEvent('workout', { detail: { active: workoutActive } }));
      });
    })();
  </script>
</body>
</html>
